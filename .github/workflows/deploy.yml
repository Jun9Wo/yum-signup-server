name: Deploy Yum Signup Server

on:
  push:
    branches:
      - develop
      - feature/signup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.YUM_SERVER_HOST }}
          username: ${{ secrets.YUM_SERVER_USER }}
          key: ${{ secrets.YUM_SSH_PRIVATE_KEY }}
          source: "."
          target: "/APP/yum-signup-server"

      - name: Restart Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.YUM_SERVER_HOST }}
          username: ${{ secrets.YUM_SERVER_USER }}
          key: ${{ secrets.YUM_SSH_PRIVATE_KEY }}
          script: |
            cd /APP/yum-signup-server
            docker-compose down
            docker-compose up -d --build
